<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#1c1e53"/>

  <!-- Psi glyph (Ψ) — modern geometric style -->
  <!-- Center vertical stem -->
  <rect x="29" y="36" width="6" height="16" rx="3" fill="#3B83EE"/>

  <!-- Left arm curving down -->
  <path d="M32 16 C32 16, 14 18, 14 32 C14 40, 20 44, 29 44" 
        stroke="#3B83EE" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Right arm curving down -->
  <path d="M32 16 C32 16, 50 18, 50 32 C50 40, 44 44, 35 44" 
        stroke="#3B83EE" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Top horizontal bar -->
